syntax = "proto3";

package iot.payperuse.edge.model.lightning;

option go_package = "gen/iot/payperuse/edge/model/lightning";

// Status of a Lightning invoice.
enum InvoiceStatus {
  INVOICE_STATUS_UNSPECIFIED = 0;
  INVOICE_STATUS_CREATED     = 1;
  INVOICE_STATUS_SETTLED     = 2;
  INVOICE_STATUS_EXPIRED     = 3;
}

// Lightning invoice representation.
message Invoice {
  string invoice_id   = 1;
  string device_id    = 2;
  string bolt11       = 3;  // encoded payment request
  int64  amount_msat  = 4;
  InvoiceStatus status = 5;
  string expires_at   = 6;  // ISO-8601 expiration time
}

// Creates a Lightning invoice for the given device and amount.
message CreateInvoiceRequest {
  string device_id   = 1;
  int64  amount_msat = 2;
  string reason      = 3;   // e.g., "USER_TOPUP"
}

message CreateInvoiceResponse {
  Invoice invoice = 1;
}

// ----- event.lightning: invoice lifecycle events -----

message InvoiceCreatedEvent {
  Invoice invoice = 1;
}

message InvoiceSettledEvent {
  string invoice_id           = 1;
  string device_id            = 2;
  int64  amount_received_msat = 3;
  int64  new_balance_msat     = 4;
  string timestamp            = 5;
}

message InvoiceExpiredEvent {
  string invoice_id = 1;
  string device_id  = 2;
  string timestamp  = 3;
}

// Envelope for entries in the event.lightning stream.
enum LightningEventType {
  LIGHTNING_EVENT_TYPE_UNSPECIFIED     = 0;
  LIGHTNING_EVENT_TYPE_INVOICE_CREATED = 1;
  LIGHTNING_EVENT_TYPE_INVOICE_SETTLED = 2;
  LIGHTNING_EVENT_TYPE_INVOICE_EXPIRED = 3;
}

message LightningEvent {
  LightningEventType type = 1;

  oneof payload {
    InvoiceCreatedEvent invoice_created = 2;
    InvoiceSettledEvent invoice_settled = 3;
    InvoiceExpiredEvent invoice_expired = 4;
  }
}