syntax = "proto3";

package iot.payperuse.edge.model.consumption;

option go_package = "github.com/robertodantas/lnpay/proto/gen/model/consumption";

// event.consumption: emitted after pricing a usage record.
message DeviceConsumptionRecordedEvent {
  string device_id        = 1;
  int64  debit_msat       = 2;   // amount to debit from the authorization
  string timestamp        = 3;   // ISO-8601 timestamp
}

// Envelope for entries in the event.consumption stream.
enum ConsumptionEventType {
  CONSUMPTION_EVENT_TYPE_UNSPECIFIED               = 0;
  CONSUMPTION_EVENT_TYPE_DEVICE_CONSUMPTION_RECORDED = 1;
}

message ConsumptionEvent {
  ConsumptionEventType type = 1;

  oneof payload {
    DeviceConsumptionRecordedEvent device_consumption_recorded = 2;
  }
}