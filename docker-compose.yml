version: '3.9'
services:
  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    container_name: caddy
    ports:
      - "8080:80"
    depends_on:
      device:
        condition: service_started
      ledger:
        condition: service_started
      consumption:
        condition: service_started
    restart: unless-stopped

  redis:
    build:
      context: ./redis
      dockerfile: Dockerfile
    container_name: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  mosquitto:
    build:
      context: ./mosquitto
      dockerfile: Dockerfile
    container_name: mosquitto
    ports:
      - "${MQTT_PORT:-1883}:1883"   # Non-TLS port
      - "${MQTT_TLS_PORT:-8883}:8883" # TLS port
      - "${MQTT_WS_PORT:-9001}:9001" # WebSocket port (non-TLS for local dev)
      - "${MQTT_WSS_PORT:-9002}:9002" # WebSocket Secure port (TLS)
    # volumes:
      # Only persist data directory (dynamic-security.json and mosquitto.db)
      # - ./mosquitto/data:/mosquitto/data
    environment:
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - MQTT_DYNSEC_ADMIN_USER=${MQTT_DYNSEC_ADMIN_USER:-}
      - MQTT_DYNSEC_ADMIN_PASSWORD=${MQTT_DYNSEC_ADMIN_PASSWORD:-}
    healthcheck:
      # Test MQTT broker by attempting a TLS connection on port 8883 with credentials
      # If connection is refused, broker is not ready (exit 1)
      # If connection succeeds or auth error occurs, broker is ready (exit 0)
      # Uses credentials from environment variables if allow_anonymous is false
      test: ["CMD-SHELL", "/mosquitto/config/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  device:
    build:
      context: .
      dockerfile: ./services/Dockerfile
      args:
        SERVICE: device
    container_name: device
    expose:
      - "8080"
    environment:
      - MQTT_BROKER=${MQTT_BROKER:-mosquitto}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_TLS_PORT=${MQTT_TLS_PORT:-8883}
      - MQTT_USE_TLS=${MQTT_USE_TLS:-true}
      - MQTT_TLS_SKIP_VERIFY=${MQTT_TLS_SKIP_VERIFY:-false}
      - MQTT_TLS_SERVER_NAME=${MQTT_TLS_SERVER_NAME:-mosquitto}
      - MQTT_TLS_CA_CERT=${MQTT_TLS_CA_CERT:-/certs/ca.crt}
      - MQTT_TLS_REQUIRE_EDGE_CERT=${MQTT_TLS_REQUIRE_EDGE_CERT:-false}
      - MQTT_TLS_EDGE_CERT=${MQTT_TLS_EDGE_CERT:-/certs/edge.crt}
      - MQTT_TLS_EDGE_KEY=${MQTT_TLS_EDGE_KEY:-/certs/edge.key}
      - MQTT_CLIENT_ID=${MQTT_CLIENT_ID:-device-service}
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - MQTT_DYNSEC_ADMIN_USER=${MQTT_DYNSEC_ADMIN_USER:-}
      - MQTT_DYNSEC_ADMIN_PASSWORD=${MQTT_DYNSEC_ADMIN_PASSWORD:-}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - LEDGER_GRPC_HOST=${LEDGER_GRPC_HOST:-ledger}
      - LEDGER_GRPC_PORT=${LEDGER_GRPC_PORT:-9090}
      - LIGHTNING_GRPC_HOST=${LIGHTNING_GRPC_HOST:-lightning}
      - LIGHTNING_GRPC_PORT=${LIGHTNING_GRPC_PORT:-9090}
      - LIGHTNING_RPC_TIMEOUT_SECONDS=${LIGHTNING_RPC_TIMEOUT_SECONDS:-30}
      - GIN_MODE=release
    volumes:
      - ./mosquitto/certs:/certs:ro
    depends_on:
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy
      ledger:
        condition: service_started
      lightning:
        condition: service_started

  ledger:
    build:
      context: .
      dockerfile: ./services/Dockerfile
      args:
        SERVICE: ledger
    container_name: ledger
    expose:
      - "8080"
    environment:
      - DB_PATH=${LEDGER_DB_PATH:-ledger.db}
      - SERVICE_TOKEN=${LEDGER_SERVICE_TOKEN:-dev-token}
      - LISTEN_ADDR=${LEDGER_LISTEN_ADDR:-:8080}
      - GRPC_ADDR=${LEDGER_GRPC_ADDR:-:9090}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - GIN_MODE=release
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  consumption:
    build:
      context: .
      dockerfile: ./services/Dockerfile
      args:
        SERVICE: consumption
    container_name: consumption
    expose:
      - "8080"
    environment:
      - DB_PATH=${CONSUMPTION_DB_PATH:-consumption.db}
      - SERVICE_TOKEN=${CONSUMPTION_SERVICE_TOKEN:-dev-token}
      - LISTEN_ADDR=${CONSUMPTION_LISTEN_ADDR:-:8080}
      - GRPC_ADDR=${CONSUMPTION_GRPC_ADDR:-:9090}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - GIN_MODE=release
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  lightning:
    build:
      context: .
      dockerfile: ./services/Dockerfile
      args:
        SERVICE: lightning
    container_name: lightning
    expose:
      - "8080"
    environment:
      - LND_HOST=host.docker.internal:10001
      - LND_MACAROON_HEX=${LND_MACAROON_HEX:-}
      - LND_TLS_CERT_HEX=${LND_TLS_CERT_HEX:-}
      - DB_PATH=${LIGHTNING_DB_PATH:-lightning.db}
      - SERVICE_TOKEN=${LIGHTNING_SERVICE_TOKEN:-dev-token}
      - LISTEN_ADDR=${LIGHTNING_LISTEN_ADDR:-:8080}
      - GRPC_ADDR=${LIGHTNING_GRPC_ADDR:-:9090}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - GIN_MODE=release
    depends_on:
      redis:
        condition: service_healthy      
    restart: unless-stopped

  smartmeter:
    build:
      context: .
      dockerfile: ./smartmeter/Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_WS_URL: ws://localhost:3001/ws
    container_name: smartmeter
    ports:
      - "3001:8080"
    environment:
      - PORT=8080
      - DEVICE_ID=${SMART_METER_DEVICE_ID:-smart-meter-001}
      - MQTT_BROKER=${MQTT_BROKER:-mosquitto}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_TLS_PORT=${MQTT_TLS_PORT:-8883}
      - MQTT_USE_TLS=${MQTT_USE_TLS:-true}
      - MQTT_TLS_SKIP_VERIFY=${MQTT_TLS_SKIP_VERIFY:-false}
      - MQTT_TLS_SERVER_NAME=${MQTT_TLS_SERVER_NAME:-mosquitto}
      - MQTT_TLS_CA_CERT=${MQTT_TLS_CA_CERT:-/certs/ca.crt}
      - MQTT_USERNAME=${SMART_METER_MQTT_USERNAME:-smart-meter-001}
      - MQTT_PASSWORD=${SMART_METER_MQTT_PASSWORD:-smart-meter-001_password}
    volumes:
      - ./mosquitto/certs:/certs:ro
    depends_on:    
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy        
    restart: unless-stopped

