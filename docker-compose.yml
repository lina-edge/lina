version: '3.9'
services:
  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    container_name: caddy
    ports:
      - "8080:80" # Northbound
    depends_on:
      device:
        condition: service_started
      ledger:
        condition: service_started
      consumption:
        condition: service_started
    restart: unless-stopped

  redis:
    build:
      context: ./redis
      dockerfile: Dockerfile
    container_name: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    env_file:
      - .env
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  mosquitto:
    build:
      context: ./mosquitto
      dockerfile: Dockerfile
    container_name: mosquitto
    ports:
      - "${MQTT_TLS_PORT:-8883}:8883" # Southbound
    volumes:
      - mosquitto-data:/mosquitto/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "/mosquitto/config/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  device:
    build:
      context: .
      dockerfile: ./services/Dockerfile
      args:
        SERVICE: device
    container_name: device
    environment:
      - MQTT_BROKER=mosquitto
      - REDIS_HOST=redis
      - LEDGER_GRPC_HOST=ledger
      - LEDGER_GRPC_PORT=${GRPC_PORT}
      - LIGHTNING_GRPC_HOST=lightning
      - LIGHTNING_GRPC_PORT=${GRPC_PORT}
      - DB_PATH=/data/devices.db
    env_file:
      - .env
    volumes:
      - ./mosquitto/certs:/certs:ro
      - device-data:/data
    depends_on:
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy
      ledger:
        condition: service_started
      lightning:
        condition: service_started

  ledger:
    build:
      context: .
      dockerfile: ./services/Dockerfile
      args:
        SERVICE: ledger
    container_name: ledger
    environment:
      - REDIS_HOST=redis
      - DB_PATH=/data/ledger.db
    env_file:
      - .env
    volumes:
      - ledger-data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  consumption:
    build:
      context: .
      dockerfile: ./services/Dockerfile
      args:
        SERVICE: consumption
    container_name: consumption
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - DB_PATH=/data/consumption.db
    env_file:
      - .env
    volumes:
      - consumption-data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  lightning:
    build:
      context: .
      dockerfile: ./services/Dockerfile
      args:
        SERVICE: lightning
    container_name: lightning
    environment:
      - LND_HOST=host.docker.internal:10001
      - REDIS_HOST=redis
      - DB_PATH=/data/lightning.db
    env_file:
      - .env
    volumes:
      - lightning-data:/data
    depends_on:
      redis:
        condition: service_healthy      
    restart: unless-stopped

  smartmeter:
    build:
      context: .
      dockerfile: ./smartmeter/Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_WS_URL: ws://localhost:3001/ws
    container_name: smartmeter
    ports:
      - "3001:8080" # UI
    environment:
      - MQTT_BROKER=mosquitto
    env_file:
      - .env
    volumes:
      - ./mosquitto/certs:/certs:ro
    depends_on:    
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy        
    restart: unless-stopped

  jaeger:
    image: jaegertracing/jaeger:2.12.0
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver

volumes:
  mosquitto-data:
  redis-data:
  device-data:
  ledger-data:
  consumption-data:
  lightning-data: