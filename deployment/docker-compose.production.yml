services:
  caddy:
    image: 7robertodantas/lina-caddy:latest
    container_name: caddy
    ports:
      - "8080:80" # Northbound
    depends_on:
      device:
        condition: service_started
      ledger:
        condition: service_started
      consumption:
        condition: service_started
    restart: unless-stopped

  redis:
    image: 7robertodantas/lina-redis:latest
    container_name: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    env_file:
      - .env
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  mosquitto:
    image: 7robertodantas/lina-mosquitto:latest
    container_name: mosquitto
    env_file:
      - .env
    ports:
      - "${MQTT_TLS_PORT:-8883}:8883" # Southbound
    volumes:
      - mosquitto-data:/mosquitto/data
      - ../infrastructure/certs:/mosquitto/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "/mosquitto/config/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  device:
    image: 7robertodantas/lina-device:latest
    container_name: device
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_TLS_SERVER_NAME=${MQTT_TLS_SERVER_NAME:-mosquitto}
      - MQTT_USERNAME=${DEVICE_SERVICE_MQTT_USERNAME}
      - MQTT_PASSWORD=${DEVICE_SERVICE_MQTT_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LEDGER_GRPC_HOST=ledger
      - LEDGER_GRPC_PORT=${GRPC_PORT}
      - LIGHTNING_GRPC_HOST=lightning
      - LIGHTNING_GRPC_PORT=${GRPC_PORT}
      - DB_PATH=/data/devices.db
    env_file:
      - .env
    volumes:
      - ../infrastructure/certs/ca.crt:/certs/ca.crt:ro
      - device-data:/data
    depends_on:
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy
      ledger:
        condition: service_started
      lightning:
        condition: service_started

  ledger:
    image: 7robertodantas/lina-ledger:latest
    container_name: ledger
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PATH=/data/ledger.db
    env_file:
      - .env
    volumes:
      - ledger-data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  consumption:
    image: 7robertodantas/lina-consumption:latest
    container_name: consumption
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=6379
      - DB_PATH=/data/consumption-pebble
    env_file:
      - .env
    volumes:
      - consumption-data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  lightning:
    image: 7robertodantas/lina-lightning:latest
    container_name: lightning
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PATH=/data/lightning.db
    env_file:
      - .env
    volumes:
      - lightning-data:/data
    depends_on:
      redis:
        condition: service_healthy      
    restart: unless-stopped

  jaeger:
    image: jaegertracing/jaeger:2.12.0
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver

volumes:
  mosquitto-data:
  redis-data:
  device-data:
  ledger-data:
  consumption-data:
  lightning-data:

