# Container log rotation (json-file driver). Override via .env: DOCKER_LOG_MAX_SIZE, DOCKER_LOG_MAX_FILE
x-logging: &default-logging
  driver: json-file
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-1m}
    max-file: ${DOCKER_LOG_MAX_FILE:-2}

services:
  caddy:
    image: 7robertodantas/lina-caddy:latest
    container_name: caddy
    ports:
      - "8080:80" # Northbound
    depends_on:
      device:
        condition: service_started
      ledger:
        condition: service_started
      consumption:
        condition: service_started
    logging: *default-logging
    restart: unless-stopped

  redis:
    image: 7robertodantas/lina-redis:latest
    container_name: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    env_file:
      - .env
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging: *default-logging
    restart: unless-stopped

  mosquitto:
    image: 7robertodantas/lina-mosquitto:latest
    container_name: mosquitto
    env_file:
      - .env
    ports:
      - "${MQTT_TLS_PORT:-8883}:8883" # Southbound
    volumes:
      - mosquitto-data:/mosquitto/data
      - ../infrastructure/certs:/mosquitto/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "/mosquitto/config/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *default-logging
    restart: unless-stopped

  device:
    image: 7robertodantas/lina-device:latest
    container_name: device
    ports:
      - "9466:9464" # Metrics    
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_TLS_SERVER_NAME=${MQTT_TLS_SERVER_NAME:-mosquitto}
      - MQTT_USERNAME=${DEVICE_SERVICE_MQTT_USERNAME}
      - MQTT_PASSWORD=${DEVICE_SERVICE_MQTT_PASSWORD}
      - REDIS_HOST=redis
      # In-cluster Redis port (must be 6379); .env REDIS_PORT is only for host publish mapping on redis service
      - REDIS_PORT=6379
      - LEDGER_GRPC_HOST=ledger
      - LEDGER_GRPC_PORT=${GRPC_PORT}
      - LIGHTNING_GRPC_HOST=lightning
      - LIGHTNING_GRPC_PORT=${GRPC_PORT}
      - DB_PATH=/data/devices.db
      # Disable OpenTelemetry
      - OTEL_EXPORTER_OTLP_ENDPOINT=
      - OTEL_SERVICE_NAME=device-service
      - OTEL_TRACES_EXPORTER=none
      - OTEL_METRICS_EXPORTER=none
    env_file:
      - .env
    volumes:
      - ../infrastructure/certs/ca.crt:/certs/ca.crt:ro
      - device-data:/data
    depends_on:
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy
      ledger:
        condition: service_started
      lightning:
        condition: service_started
    logging: *default-logging

  ledger:
    image: 7robertodantas/lina-ledger:latest
    container_name: ledger
    ports:
      - "9460:9464"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PATH=/data/ledger-pebble
      # Disable OpenTelemetry
      - OTEL_EXPORTER_OTLP_ENDPOINT=
      - OTEL_SERVICE_NAME=ledger-service
      - OTEL_TRACES_EXPORTER=none
      - OTEL_METRICS_EXPORTER=none
    env_file:
      - .env
    volumes:
      - ledger-data:/data
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  consumption:
    image: 7robertodantas/lina-consumption:latest
    container_name: consumption
    ports:
      - "9465:9464"    
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PATH=/data/consumption-pebble
      # Disable OpenTelemetry
      - OTEL_EXPORTER_OTLP_ENDPOINT=
      - OTEL_SERVICE_NAME=consumption-service
      - OTEL_TRACES_EXPORTER=none
      - OTEL_METRICS_EXPORTER=none
    env_file:
      - .env
    volumes:
      - consumption-data:/data
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  lightning:
    image: 7robertodantas/lina-lightning:latest
    container_name: lightning
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PATH=/data/lightning.db
      # Disable OpenTelemetry
      - OTEL_EXPORTER_OTLP_ENDPOINT=
      - OTEL_SERVICE_NAME=lightning-service
      - OTEL_TRACES_EXPORTER=none
      - OTEL_METRICS_EXPORTER=none
    env_file:
      - .env
    volumes:
      - lightning-data:/data
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  redis_exporter:
    image: oliver006/redis_exporter:v1.80.1-alpine
    container_name: redis_exporter
    ports:
      - "9461:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_EXPORTER_REDIS_ONLY_METRICS=true
      - REDIS_EXPORTER_CHECK_SINGLE_STREAMS=event.ledger,event.consumption,event.device,event.lightning
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  cadvisor_exporter:
    image: ghcr.io/google/cadvisor:0.54.1 # https://github.com/google/cadvisor/pkgs/container/cadvisor
    container_name: cadvisor_exporter
    privileged: true
    restart: unless-stopped
    ports:
      - "9462:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    devices:
      - /dev/kmsg:/dev/kmsg
    logging: *default-logging

  node_exporter:
    image: prom/node-exporter:v1.10.2
    container_name: node_exporter
    restart: unless-stopped
    # If you decide to use host networking for real NIC metrics:
    # network_mode: host
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9463:9100"   # remove this if you use network_mode: host
    logging: *default-logging

  # Host /proc via pid + mount (same idea as Ansible process-exporter on bare metal).
  process_exporter:
    image: ncabatoff/process-exporter:0.8.7
    container_name: process_exporter
    restart: unless-stopped
    pid: host
    ports:
      - "9256:9256"
    volumes:
      - /proc:/host/proc:ro
    command:
      - --procfs=/host/proc
      - --web.listen-address=:9256
    logging: *default-logging

  # Talks to the host systemd over D-Bus. Linux only; typically unusable on Docker Desktop (macOS).
  systemd_exporter:
    image: prometheuscommunity/systemd-exporter:v0.7.0
    container_name: systemd_exporter
    restart: unless-stopped
    pid: host
    ports:
      - "9558:9558"
    volumes:
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket:ro
    command:
      - --web.listen-address=:9558
    logging: *default-logging


volumes:
  mosquitto-data:
  redis-data:
  device-data:
  ledger-data:
  consumption-data:
  lightning-data:

