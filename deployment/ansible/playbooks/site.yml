---
- name: Validate control-side settings
  hosts: edge
  gather_facts: false
  # Do not sudo on the Mac for localhost-delegated checks (ansible.cfg has become=true).
  become: false
  tasks:
    - name: Pre-built mode requires lina_binaries_dir on the controller
      ansible.builtin.assert:
        that:
          - lina_binaries_dir is defined
          - (lina_binaries_dir | string | length) > 0
        fail_msg: >-
          Set lina_build_binaries=false only when providing lina_binaries_dir — an absolute path
          on this machine with device, ledger, consumption, and lightning binaries.
      when: not (lina_build_binaries | default(true) | bool)
      run_once: true

    - name: Build mode requires Go on the controller
      ansible.builtin.command: which go
      changed_when: false
      when: lina_build_binaries | default(true) | bool
      run_once: true
      delegate_to: localhost
      connection: local
      become: false

- name: Deploy LINA edge stack (native)
  hosts: edge
  roles:
    - role: common
    - role: redis
    - role: nanomq
    - role: lina-services
    - role: caddy
    - role: monitoring
