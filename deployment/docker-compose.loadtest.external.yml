services:
  autopay:
    image: 7robertodantas/lina-autopay:latest
    container_name: autopay
    environment:
      - NETWORK=regtest
    env_file:
      - .env.loadtest
    restart: unless-stopped

  smartmeter:
    image: 7robertodantas/lina-smartmeter:latest
    container_name: smartmeter
    ports:
      - "3010:8080" # UI
    environment:
      - DEVICE_ID=smart-meter-001
      - DEVICE_SECRET=smart-meter-001_password
    env_file:
      - .env.simulators
    volumes:
      - ../infrastructure/certs/ca.crt:/certs/ca.crt:ro
    restart: unless-stopped

  httpdevice:
    build:
      context: ..
      dockerfile: testing/loadtest/httpdevice/Dockerfile
    container_name: httpdevice
    ports:
      - "3002:8080"
    env_file:
      - .env.loadtest
    environment:
      - MQTT_BROKER=192.168.0.170
    volumes:
      - ../infrastructure/certs/ca.crt:/certs/ca.crt:ro
    restart: unless-stopped

  prometheus:
    build:
      context: ../infrastructure/prometheus
      dockerfile: Dockerfile
    container_name: prometheus
    ports:
      - "9090:9090"  # Prometheus UI
    env_file:
      - .env.loadtest
    environment:
      - TARGET_HOST=192.168.0.170
    volumes:
      - ../infrastructure/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    entrypoint:
      - /bin/sh
      - /etc/prometheus/entrypoint.sh
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-remote-write-receiver'
    restart: unless-stopped

  grafana:  
    image: grafana/grafana:12.3
    container_name: grafana
    ports:
      - "3000:3000" # Grafana UI
    env_file:
      - .env.loadtest
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ../infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - ../infrastructure/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data: