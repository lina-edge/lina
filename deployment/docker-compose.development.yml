services:
  caddy:
    build:
      context: ../infrastructure/caddy
      dockerfile: Dockerfile
    container_name: caddy
    ports:
      - "8080:80" # Northbound
    depends_on:
      device:
        condition: service_started
      ledger:
        condition: service_started
      consumption:
        condition: service_started
    restart: unless-stopped

  redis:
    build:
      context: ../infrastructure/redis
      dockerfile: Dockerfile
    container_name: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    env_file:
      - .env
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  mosquitto:
    build:
      context: ../infrastructure/mosquitto
      dockerfile: Dockerfile
    container_name: mosquitto
    env_file:
      - .env
    ports:
      - "${MQTT_TLS_PORT:-8883}:8883" # Southbound
    volumes:
      - mosquitto-data:/mosquitto/data
      - ../infrastructure/certs:/mosquitto/certs:rw
    healthcheck:
      test: ["CMD-SHELL", "/mosquitto/config/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  device:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE: device
    container_name: device
    ports:
      - "9466:9464" # Metrics
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_TLS_SERVER_NAME=${MQTT_TLS_SERVER_NAME:-mosquitto}
      - MQTT_USERNAME=${DEVICE_SERVICE_MQTT_USERNAME}
      - MQTT_PASSWORD=${DEVICE_SERVICE_MQTT_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LEDGER_GRPC_HOST=ledger
      - LEDGER_GRPC_PORT=${GRPC_PORT}
      - LIGHTNING_GRPC_HOST=lightning
      - LIGHTNING_GRPC_PORT=${GRPC_PORT}
      - DB_PATH=/data/devices.db
    env_file:
      - .env
    volumes:
      - ../infrastructure/certs/ca.crt:/certs/ca.crt:ro
      - device-data:/data
    depends_on:
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy
      ledger:
        condition: service_started
      lightning:
        condition: service_started

  ledger:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE: ledger
    ports:
      - "9460:9464"
    container_name: ledger
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PATH=/data/ledger.db
    env_file:
      - .env
    volumes:
      - ledger-data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  consumption:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE: consumption
    ports:
      - "9465:9464"        
    container_name: consumption
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=6379
      - DB_PATH=/data/consumption-pebble
    env_file:
      - .env
    volumes:
      - consumption-data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  lightning:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE: lightning
    container_name: lightning
    environment:
      - LND_HOST=${LND_HOST}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PATH=/data/lightning.db
    env_file:
      - .env
    volumes:
      - lightning-data:/data
    depends_on:
      redis:
        condition: service_healthy      
    restart: unless-stopped

  smartmeter:
    build:
      context: ..
      dockerfile: testing/smartmeter/Dockerfile
    container_name: smartmeter
    ports:
      - "3010:8080" # UI
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_TLS_SERVER_NAME=${MQTT_TLS_SERVER_NAME:-mosquitto}
      - DEVICE_ID=smart-meter-001
      - DEVICE_SECRET=smart-meter-001_password
    env_file:
      - .env
    volumes:
      - ../infrastructure/certs/ca.crt:/certs/ca.crt:ro
    depends_on:    
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy        
    restart: unless-stopped

  httpdevices:
    build:
      context: ..
      dockerfile: testing/loadtest/httpdevices/Dockerfile
    container_name: httpdevices
    ports:
      - "3002:8080" # UI
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_TLS_SERVER_NAME=${MQTT_TLS_SERVER_NAME:-mosquitto}
    env_file:
      - .env
    volumes:
      - ../infrastructure/certs/ca.crt:/certs/ca.crt:ro
    depends_on:    
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy        
    restart: unless-stopped

  jaeger:
    image: jaegertracing/jaeger:2.12.0
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver

  redis_exporter:
    image: oliver006/redis_exporter:v1.80.1-alpine
    container_name: redis_exporter
    ports:
      - "9461:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_EXPORTER_REDIS_ONLY_METRICS=true
      - REDIS_EXPORTER_CHECK_SINGLE_STREAMS=event.ledger,event.consumption,event.device,event.lightning
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  cadvisor_exporter:
    image: ghcr.io/google/cadvisor:0.54.1 # https://github.com/google/cadvisor/pkgs/container/cadvisor
    container_name: cadvisor_exporter
    privileged: true
    restart: unless-stopped
    ports:
      - "9462:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    devices:
      - /dev/kmsg:/dev/kmsg

  node_exporter:
    image: prom/node-exporter:v1.10.2
    container_name: node_exporter
    restart: unless-stopped
    # If you decide to use host networking for real NIC metrics:
    # network_mode: host
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9463:9100"   # remove this if you use network_mode: host

  prometheus:
    build:
      context: ../infrastructure/prometheus
      dockerfile: Dockerfile
    container_name: prometheus
    ports:
      - "9090:9090"  # Prometheus UI
    env_file:
      - .env
    environment:
      - PROMETHEUS_TARGET_HOST=host.docker.internal
      - PROMETHEUS_SCRAPE_JOBS=ledger:9460,consumption:9465,device:9466,redis:9461,cadvisor:9462,node:9463,process:9256,systemd:9558
    volumes:
      - ../infrastructure/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    entrypoint:
      - /bin/sh
      - /etc/prometheus/entrypoint.sh
    command:
      - '--config.file=/tmp/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-remote-write-receiver'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped

  grafana:  
    build:
      context: ../infrastructure/grafana
      dockerfile: Dockerfile
    container_name: grafana
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  autopay:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE: autopay
    container_name: autopay
    environment:
      - NETWORK=regtest
      - AUTOPAY_ENABLED=${AUTOPAY_ENABLED:-false}
    env_file:
      - .env
    restart: unless-stopped
    # Note: Autopay connects directly to LND nodes, so it doesn't strictly need
    # the lightning service, but it's included as a dependency to ensure LND
    # is available when autopay starts. If LND is external, remove this dependency.
    # depends_on:
    #   lightning:
    #     condition: service_started

volumes:
  mosquitto-data:
  redis-data:
  device-data:
  ledger-data:
  consumption-data:
  lightning-data:
  prometheus-data:
  grafana-data: