# Mosquitto configuration
# This file can be customized via environment variables in docker-compose

# Basic listener configuration
# listener 1883
allow_anonymous false

# TLS listener configuration
listener 8883
protocol mqtt
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
require_certificate false

# Logging - output to stdout
log_dest stdout
log_type all

# Persistence
persistence true
persistence_location /mosquitto/data/

# Connection settings
max_connections -1
max_inflight_messages 20
max_queued_messages 1000

# Security
# Using Dynamic Security Plugin for authentication
# password_file is disabled to allow dynamic provisioning of devices
# If you need password_file authentication, uncomment the line below:
# password_file /mosquitto/config/passwd

# Dynamic Security Plugin
plugin /usr/lib/mosquitto_dynamic_security.so
plugin_opt_config_file /mosquitto/data/dynamic-security.json

# Every User / Client should follow the given RBAC rules
per_listener_settings false